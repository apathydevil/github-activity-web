<!DOCTYPE html>
<html>
<head>
    <title>{{ username }}'s Activity</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1>{{ username }}'s recent GitHub activity</h1>
        <a href="/" class="btn btn-dark mb-3">Search again</a>
        <ul class="list-group">
            {% for event in events %}
                <li class="list-group-item">{{ event }}</li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
